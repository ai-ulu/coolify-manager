version: '3.8'

services:
  coolify-manager:
    build: .
    container_name: coolify-manager
    restart: unless-stopped
    environment:
      - COOLIFY_API_URL=${COOLIFY_API_URL}
      - COOLIFY_API_KEY=${COOLIFY_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
      - TELEGRAM_ADMIN_USERS=${TELEGRAM_ADMIN_USERS}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - LLM_ROUTER_ENABLED=${LLM_ROUTER_ENABLED:-true}
      - LITELLM_API_BASE=${LITELLM_API_BASE:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      - LITELLM_MODEL=${LITELLM_MODEL:-gpt-4o-mini}
      - BACKUP_AUTO_ENABLED=${BACKUP_AUTO_ENABLED:-true}
      - BACKUP_SCHEDULE=${BACKUP_SCHEDULE:-0 2 * * *}
      - AUTO_CLEANUP_ENABLED=${AUTO_CLEANUP_ENABLED:-false}
      - AUTO_CLEANUP_PATHS=${AUTO_CLEANUP_PATHS:-}
      - ACTION_ALLOWLIST_APPS=${ACTION_ALLOWLIST_APPS:-}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "5000:5000"
    # Ağ için bridge modu (port expose etmek için):
    # ports:
    #   - "5000:5000"

  # Eğer ollama localde değilse ekleyin:
